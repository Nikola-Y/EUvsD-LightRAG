services:
  lightrag:
    container_name: lightrag
    image: ghcr.io/hkuds/lightrag:v1.5.0
    ports:
      - "${PORT:-9621}:${PORT:-9621}"
    volumes:
      - lightrag_storage:/app/data/rag_storage
      - lightrag_inputs:/app/data/inputs
      - lightrag_tiktoken:/app/data/tiktoken
      - lightrag_app:/app
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - TIKTOKEN_CACHE_DIR=/app/data/tiktoken
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  migrate-all:
     image: busybox:latest
     container_name: lightrag_migrate_all
     volumes:
        - ./data/rag_storage:/rag_storage
        - ./data/inputs:/inputs
        - ./data/tiktoken:/tiktoken
        - ./:/lightrag_app
        - lightrag_storage:/dest_rag_storage
        - lightrag_inputs:/dest_inputs
        - lightrag_tiktoken:/dest_tiktoken
        - lightrag_app:/dest_lightrag_app
     command: sh -c "
        cp -r /rag_storage/* /dest_rag_storage/ 2>/dev/null || true &&
        cp -r /inputs/* /dest_inputs/ 2>/dev/null || true &&
        cp -r /tiktoken/* /dest_tiktoken/ 2>/dev/null || true &&
       cp -r /lightrag_app/* /dest_lightrag_app/ 2>/dev/null || true &&
       echo 'All data migrated successfully'"
     restart: "no"

  sftp:
    image: atmoz/sftp:latest
    container_name: lightrag_sftp
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - lightrag_app:/home/${SFTP_USER:-sftp_user}/lightrag_app:rw
      - lightrag_storage:/home/${SFTP_USER:-sftp_user}/lightrag_storage:rw
      - lightrag_inputs:/home/${SFTP_USER:-sftp_user}/lightrag_inputs:rw
      - lightrag_tiktoken:/home/${SFTP_USER:-sftp_user}/lightrag_tiktoken:rw
    environment:
      - SFTP_USERS=${SFTP_USER:-sftp_user}:${SFTP_PASSWORD:-password}:1001
    restart: unless-stopped
    entrypoint: |
      sh -c "
      chown -R 1001:1001 /home/${SFTP_USER:-sftp_user}/lightrag_app &&
      chmod -R 755 /home/${SFTP_USER:-sftp_user}/lightrag_app &&
      chown -R 1001:1001 /home/${SFTP_USER:-sftp_user}/lightrag_storage &&
      chmod -R 755 /home/${SFTP_USER:-sftp_user}/lightrag_storage &&
      chown -R 1001:1001 /home/${SFTP_USER:-sftp_user}/lightrag_inputs &&
      chmod -R 755 /home/${SFTP_USER:-sftp_user}/lightrag_inputs &&
      chown -R 1001:1001 /home/${SFTP_USER:-sftp_user}/lightrag_tiktoken &&
      chmod -R 755 /home/${SFTP_USER:-sftp_user}/lightrag_tiktoken &&
      /entrypoint ${SFTP_USER:-sftp_user}:${SFTP_PASSWORD:-password}:1001
      "
    command: ${SFTP_USER:-sftp_user}:${SFTP_PASSWORD:-password}:1001

volumes:
  lightrag_storage:
  lightrag_inputs:
  lightrag_tiktoken:
  lightrag_app:
